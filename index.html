<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Language Selection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="logo.css">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #111;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #logo-container {
            width: 100%;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        #main-logo {
            width: 180px;
            height: auto;
        }

        #language-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            align-items: center;
        }

        .language-button {
            width: 100%;
            padding: 14px 0;
            border-radius: 8px;
            border: none;
            font-size: 18px;
            cursor: pointer;
            background-color: #ffcc33;
            color: #111;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .language-button:hover {
            background-color: #ffdd55;
        }

        a.language-link {
            width: 100%;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <div id="logo-container">
        <img src="audio/logo/toris_logo.png" alt="App Logo" id="main-logo">
    </div>

    <!-- Language selection -->
    <div id="language-container">

        <!-- Japanese -->
        <a class="language-link" 
           href="japanese_home.html">
            <button class="language-button">日本語</button>
        </a>

        <!-- Spanish -->
        <a class="language-link" 
           href="Projecto/Espanol/frontend/spanish.html">
            <button class="language-button">Español</button>
        </a>

    </div>

</body>
</html>
