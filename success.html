<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Successful</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
  </style>

  <!-- Supabase -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body>
  <h1>Payment Successful</h1>
  <p>Your membership is now active. Redirecting...</p>

  <script>
    // Supabase client
    const sb = window.supabase.createClient(
      "https://uuunamcyjlhgjrihhcyv.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dW5hbWN5amxoZ2pyaWhoY3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDQ5NDEsImV4cCI6MjA5NjYyMDk0MX0.i_WcLHDq7PTG8lMoeXxcvgKGbZr0GWlDrlEJycHEVak"
    );

    // Wait for Supabase session to restore after Stripe redirect
    async function waitForSession() {
      const { data } = await sb.auth.getSession();
      if (!data.session) {
        return new Promise(resolve => setTimeout(() => resolve(waitForSession()), 400));
      }
      return data.session.user;
    }

    // Wait for webhook to update membership in Supabase
    async function waitForMembership(email) {
      const { data } = await sb
        .from("profiles")
        .select("membership_status, membership_plan")
        .eq("email", email)
        .maybeSingle();

      if (!data || data.membership_status !== "active") {
        return new Promise(resolve => setTimeout(() => resolve(waitForMembership(email)), 400));
      }

      return data;
    }

    async function go() {
      // 1. Wait for session
      const user = await waitForSession();

      // 2. Wait for webhook to finish writing membership
      const membership = await waitForMembership(user.email);

      console.log("SUCCESS PAGE MEMBERSHIP:", membership);

      // 3. Mark that the user just paid
      localStorage.setItem("justPaid", "true");

      // 4. Unlock ALL levels for Premium or Lifetime
      const plan = membership.membership_plan;
      const premiumPlans = ["premium-monthly", "premium-yearly", "lifetime"];

      if (premiumPlans.includes(plan)) {
        localStorage.setItem("premiumUnlock", "true");
      }

      // 5. Redirect back to the app
      window.location.href = "/index.html";
    }

    go();
  </script>
</body>
</html>
