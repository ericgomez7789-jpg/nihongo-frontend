<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout – Basic Plan</title>
  <link rel="stylesheet" href="logo.css">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      background: #111;
      padding: 30px;
      border-radius: 10px;
      border: 1px solid #333;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    p {
      color: #bbb;
      margin-bottom: 20px;
    }

    .checkoutBtn {
      background: #4caf50;
      color: #fff;
      border: none;
      padding: 14px 20px;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
    }

    .checkoutBtn:hover {
      background: #5ecf63;
    }

    .checkoutBtn.disabled {
      background: #333;
      border-color: #555;
      color: #777;
      cursor: default;
    }

    .back {
      margin-top: 20px;
    }

    .back a {
      color: #7fd1ff;
      text-decoration: none;
    }
  </style>

  <script src="https://js.stripe.com/v3"></script>
</head>

<body>

<div id="header-logo">
  <img src="audio/logo/toris_logo.png" alt="App Logo">
</div>

<div class="container">
  <h1>Basic Plan Checkout</h1>
  <p>You're about to unlock Levels 4–8.</p>
  <p>Levels 1–3 are always free.</p>
  <p>Price: <strong>$7.99 / month</strong></p>

  <button id="checkoutBtn" class="checkoutBtn">Proceed to Payment</button>

  <div class="back">
    <a href="membership.html">← Back to Membership</a>
  </div>
</div>

<!-- Load Supabase client -->
<script type="module" src="app.js"></script>

<script type="module">
  const sb = window.sb;
  const stripe = Stripe("pk_live_51TiJc5F0QR7lUrADCcjTU7P0u3PCEqZknbU9HK9VfQCsY3uRRRi7ZQzwKoU90aRLNvuv31bd37vFRxwywzyiR1cY0069mgLBWo");

  const btn = document.getElementById("checkoutBtn");

  async function checkMembership() {
    // Stabilize session after Stripe redirect
    await sb.auth.refreshSession();
    const { data: sessionData } = await sb.auth.getSession();
    const user = sessionData.session?.user;

    if (!user) {
      alert("Please log in first.");
      window.location.href = "blog-podcast.html";
      return false;
    }

    // Fetch profile safely
    const { data: profile, error } = await sb
      .from("profiles")
      .select("*")
      .eq("id", user.id)
      .single();

    if (error) {
      console.error("Profile fetch error:", error);
      alert("Unable to load your membership profile.");
      return false;
    }

    console.log("Profile:", profile);

    // Block duplicate payments
    if (profile.membership_status === "active") {
      btn.classList.add("disabled");
      btn.textContent = "Already Subscribed";
      btn.onclick = null;
      return false;
    }

    return true;
  }

  async function startCheckout() {
    const allowed = await checkMembership();
    if (!allowed) return;

    try {
      const response = await fetch(
        "https://nihongo-backend-jlm3.onrender.com/create-checkout-session-basic",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        }
      );

      const session = await response.json();

      if (!session.url) {
        alert("Error: No checkout URL returned.");
        return;
      }

      window.location = session.url;

    } catch (err) {
      console.error("Checkout error:", err);
      alert("Something went wrong starting checkout.");
    }
  }

  btn.onclick = startCheckout;
</script>

</body>
</html>
