<!-- Supabase CDN MUST load before your script -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
/* -----------------------------------------
   ENSURE SUPABASE LOADED
------------------------------------------*/
if (!window.supabase) {
  console.error("Supabase failed to load.");
}

/* -----------------------------------------
   BLOG SUPABASE CLIENT
------------------------------------------*/
const blogSupabase = window.supabase.createClient(
  "https://uuunamcyjlhgjrihhcyv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dW5hbWN5amxoZ2pyaWhoY3l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDQ5NDEsImV4cCI6MjA5NjYyMDk0MX0.i_WcLHDq7PTG8lMoeXxcvgKGbZr0GWlDrlEJycHEVak"
);

/* -----------------------------------------
   SHOW UNLOCK PROMPT IF REDIRECTED
------------------------------------------*/
const params = new URLSearchParams(window.location.search);
const msg = params.get("msg");

if (msg) {
  const box = document.getElementById("unlockPrompt");
  box.textContent = msg;
  box.style.display = "block";
}

/* ---------------------------
   INITIAL SESSION CHECK
----------------------------*/
blogSupabase.auth.getSession().then(({ data }) => {
  const session = data.session;
  const loggedIn = !!session;

  document.getElementById("authBox").style.display = loggedIn ? "none" : "block";
  document.getElementById("logoutBox").style.display = loggedIn ? "block" : "none";
  document.getElementById("app").style.display = loggedIn ? "block" : "none";

  if (loggedIn) renderPosts();
});

/* ---------------------------
   AUTH LOGIC (LOGIN / LOGOUT)
----------------------------*/
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const { error } = await blogSupabase.auth.signInWithPassword({ email, password });
  if (error) alert(error.message);
}

async function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const { error } = await blogSupabase.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Signup successful. Check your email to confirm.");
}

async function logout() {
  await blogSupabase.auth.signOut();

  // Immediate UI update
  document.getElementById("authBox").style.display = "block";
  document.getElementById("logoutBox").style.display = "none";
  document.getElementById("app").style.display = "none";
  document.getElementById("posts").innerHTML = "";
}

window.login = login;
window.signup = signup;
window.logout = logout;

/* ---------------------------
   LOGIN STATE HANDLING
----------------------------*/
blogSupabase.auth.onAuthStateChange(async (event, session) => {
  const loggedIn = !!session;

  document.getElementById("authBox").style.display = loggedIn ? "none" : "block";
  document.getElementById("logoutBox").style.display = loggedIn ? "block" : "none";
  document.getElementById("app").style.display = loggedIn ? "block" : "none";

  if (!loggedIn) {
    document.getElementById("posts").innerHTML = "";
    return;
  }

  await renderPosts();
});

/* ---------------------------
   BLOG / PODCAST LOGIC
----------------------------*/
const Blog = {
  async getPosts() {
    const { data } = await blogSupabase
      .from("posts")
      .select("id, title, body, audio_url, created_at")
      .order("created_at", { ascending: false });
    return data || [];
  },

  async addPost({ title, body, audio }) {
    let audio_url = null;

    if (audio instanceof Blob) {
      const fileName = `audio-${Date.now()}.webm`;
      const { error } = await blogSupabase.storage
        .from("audio")
        .upload(fileName, audio, { contentType: "audio/webm" });

      if (!error) {
        audio_url = blogSupabase.storage
          .from("audio")
          .getPublicUrl(fileName).data.publicUrl;
      }
    }

    if (typeof audio === "string") audio_url = audio;

    await blogSupabase.from("posts").insert({ title, body, audio_url });
  },

  async deletePost(id) {
    await blogSupabase.from("posts").delete().eq("id", id);
  }
};

const container = document.getElementById("posts");

async function renderPosts() {
  const posts = await Blog.getPosts();

  if (!posts.length) {
    container.innerHTML = "<p>No posts yet.</p>";
    return;
  }

  container.innerHTML = posts.map(post => `
    <article>
      <h2>${post.title}</h2>
      <p style="color:#aaa; font-size:14px;">
        ${new Date(post.created_at).toLocaleString()}
      </p>

      <button class="danger-btn" onclick="handleDeletePost('${post.id}')">
        Delete Post
      </button>

      ${post.body ? `<p>${post.body}</p>` : ""}
      ${post.audio_url ? `
        <audio controls style="margin-top:20px; width:100%;">
          <source src="${post.audio_url}">
        </audio>
      ` : ""}
    </article>
  `).join("");
}

window.handleDeletePost = async (id) => {
  if (!confirm("Delete this post?")) return;
  await Blog.deletePost(id);
  renderPosts();
};

window.publishPost = async () => {
  const title = document.getElementById("newTitle").value.trim();
  const body = document.getElementById("newBody").value.trim();
  if (!body) return;

  await Blog.addPost({ title: title || "Untitled", body });
  document.getElementById("newTitle").value = "";
  document.getElementById("newBody").value = "";
  renderPosts();
};

window.publishAudio = async () => {
  const audio = document.getElementById("audioInput").value.trim();
  if (!audio) return;

  await Blog.addPost({ title: "Podcast Audio Clip", body: "", audio });
  document.getElementById("audioInput").value = "";
  renderPosts();
};

/* ---------------------------
   AUDIO RECORDING
----------------------------*/
let mediaRecorder;
let audioChunks = [];

const recordBtn = document.getElementById("recordBtn");
const stopBtn = document.getElementById("stopBtn");
const recordStatus = document.getElementById("recordStatus");

recordBtn.onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.start();

    recordBtn.disabled = true;
    stopBtn.disabled = false;
    recordStatus.textContent = "Recording... 🎤";

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  } catch {
    recordStatus.textContent = "Microphone access denied.";
  }
};

stopBtn.onclick = () => {
  mediaRecorder.stop();
  recordBtn.disabled = false;
  stopBtn.disabled = true;
  recordStatus.textContent = "Processing audio...";

  mediaRecorder.onstop = async () => {
    const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

    recordStatus.textContent = "Uploading audio...";
    await Blog.addPost({
      title: "Recorded Audio Clip",
      body: "",
      audio: audioBlob
    });

    recordStatus.textContent = "Recorded audio saved.";
    renderPosts();
  };
};
</script>
